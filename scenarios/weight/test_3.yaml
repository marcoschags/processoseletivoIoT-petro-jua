name: 'Teste de Anomalia - Caixa Removida ou Erro de Leitura'
version: 1
author: 'Aluno'
steps:
  # 1. Inicialização do sistema
  - wait-serial: 'Sistema Kanban Inicializado'

  # 2. Simula estado inicial estável
  - set-control:
      part-id: hx711
      control: load
      value: 5000
  - delay: 1s

  # 3. Força um peso de 0g (Abaixo até mesmo do peso físico esperado da caixa vazia)
  - set-control:
      part-id: hx711
      control: load
      value: 0

  # 4. Aguarda 3 ciclos de leitura (15s) para o debounce de leituras zero confirmar anomalia
  - delay: 16s

  # 5. O sistema deve identificar que o valor está incorreto/crítico e alertar a manutenção
  - wait-serial: 'ALERTA: Caixa ausente ou erro de calibração no sensor HX711!'
  - delay: 500ms
