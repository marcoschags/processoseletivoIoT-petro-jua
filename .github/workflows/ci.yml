name: ESP32 Filesystem Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  detect_project:
    runs-on: ubuntu-latest
    outputs:
      project_folder:${{steps.select_folder.output.project_folder}}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Identify active project
        id: set_folder
        run: |
          #Padrão de segurança
          FOLDER="WEIGHT"

          if [-f "scenarios/WEITHG.txt" ]; then
            FOLDER=WEITHG
          elif [ -f "scenarios/TEMPERATURE.txt"]; then
            FOLDER=TEMPERATURE
          elif [ -f "scenarios/LIGHT.txt"]; then
            FOLDER=LIGHT
          fi

          echo "project_folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "Projeto ativo detectado: $FOLDER"

  build_filesystem:
    needs: detect_project
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t esp32-builder -f Dockerfile .

    - name: Run container and generate fs.bin
      run: |
        docker run --name esp32-fs-builder esp32-builder /bin/bash
        
        docker cp esp32-fs-builder:/fs.bin .

    - name: Test with Wokwi
      uses: wokwi/wokwi-ci-action@v1
      with:
        token: ${{ secrets.WOKWI_CLI_TOKEN }}
        scenario: 'kanban_teste.test.yaml'
